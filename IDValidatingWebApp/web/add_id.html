<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add ID Page</title>
    <style>
        /* Color variables matching the Welcome Page design */
        :root {
            --title-color: navy;           /* Deep Blue for the Header Text */
            --button-bg: blue;            /* Standard Blue for the Button */
            --button-hover: darkblue;      /* Darker Blue when hovering */
            --focus-border: green;         /* Input focus highlight border */
            --body-bg: ghostwhite;        /* Soft off-white for the page background */
            --card-bg: white;             /* White background for the main card */
            --text-main: black;
            --text-muted: dimgray;
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--body-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Portal Container Card */
        .portal-card {
            background-color: var(--card-bg);
            padding: 40px 32px;
            border-radius: var(--radius);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            max-width: 440px;
            width: 100%;
            border: 1px solid lightgray;
        }

        /* Typography */
        h1 {
            color: var(--title-color);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            text-align: center;
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 28px;
            text-align: center;
        }

        /* Form Layout */
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Input Styling */
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 1px solid lightgray;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s ease-in-out;
        }

        input[type="text"]:focus {
            border-color: var(--focus-border);
            box-shadow: 0 0 0 3px rgba(0, 128, 0, 0.1);
        }

        /* Form Button Styling */
        button[type="submit"] {
            width: 100%;
            background-color: var(--button-bg);
            color: white;
            border: none;
            font-weight: 600;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            margin-top: 8px;
        }

        button[type="submit"]:hover {
            background-color: var(--button-hover);
            transform: translateY(-1px);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <main class="portal-card">
        <h1>Add ID</h1>
        <p>Please enter your identification credentials below to run the check framework.</p>
        
        <!-- Keeps your exact backend action and pattern attributes -->
        <form action="VerifyServlet.do" method="POST">
            <div class="form-group">
                <label for="idNumber">ID Number</label>
                <input 
                    type="text" 
                    id="idNumber"
                    name="idNumber" 
                    placeholder="Enter 13-digit ID"
                    required 
                    minlength="13" 
                    maxlength="13" 
                    pattern="\d{13}" 
                    title="Please enter exactly 13 digits">
            </div>
            
            <button type="submit">Check ID</button> 
        </form>
    </main>

</body>
</html>
